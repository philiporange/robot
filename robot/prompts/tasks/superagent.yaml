name: superagent
description: Run as a superagent with ability to spawn subagents

defaults:
  timeout: 600  # 10 minutes for the superagent itself
  max_subagents: 5
  subagent_timeout: 300  # 5 minutes per subagent

models:
  claude: sonnet
  codex: o4-mini
  gemini: gemini-2.5-pro
  vibe: mistral-large
  aider: sonnet

system: |
  You are a superagent capable of orchestrating complex tasks by delegating
  subtasks to specialized subagents. You excel at:
  - Breaking down complex problems into manageable subtasks
  - Choosing the right subagent for each task
  - Coordinating parallel work streams
  - Verifying and integrating subagent outputs
  - Handling failures gracefully

  Use your subagent capabilities wisely. Not every task needs subagents -
  sometimes doing the work directly is more efficient.

prompt: |
  {task}

  Consider whether this task would benefit from using subagents. If so:
  1. Break it down into subtasks
  2. Spawn appropriate subagents
  3. Verify their work
  4. Integrate the results

  {additional_instructions}

variables:
  task: ""
  additional_instructions: ""

output:
  type: stdout
